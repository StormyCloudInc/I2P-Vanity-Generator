name: Test GPU Build

on:
  push:
    branches: ['gpu-support']

jobs:
  build-macos-gpu:
    runs-on: [self-hosted, macOS]

    steps:
      - uses: actions/checkout@v4

      - name: Build macOS arm64 with GPU support
        env:
          GOOS: darwin
          GOARCH: arm64
          CGO_ENABLED: 1
          CC: clang
        run: |
          go version
          echo "Building with Metal GPU support..."
          LDFLAGS="-s -w -X github.com/go-i2p/i2p-vanitygen/internal/version.Version=gpu-test"
          go build -ldflags "${LDFLAGS}" -o "vanitygenerator" .
          echo "Build successful!"
          ls -la vanitygenerator
          file vanitygenerator

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vanitygenerator-macos-gpu-test
          path: vanitygenerator

  build-windows-gpu:
    runs-on: [self-hosted, Windows, X64]

    steps:
      - uses: actions/checkout@v4

      - name: Generate OpenCL import library
        run: |
          $gccDir = Split-Path (Get-Command gcc).Source
          $libDir = Join-Path (Split-Path $gccDir) "lib"
          gendef C:\Windows\System32\OpenCL.dll
          dlltool -d OpenCL.def -l libOpenCL.a
          Copy-Item libOpenCL.a $libDir
          Write-Host "Installed libOpenCL.a to $libDir"
        shell: powershell

      - name: Build Windows amd64 with GPU support
        run: |
          go version
          echo Building with OpenCL GPU support...
          set GOOS=windows
          set GOARCH=amd64
          set CGO_ENABLED=1
          set CC=gcc
          go build -ldflags "-H=windowsgui -s -w -X github.com/go-i2p/i2p-vanitygen/internal/version.Version=gpu-test" -o "vanitygenerator.exe" .
          echo Build successful!
          dir vanitygenerator.exe
        shell: cmd

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vanitygenerator-windows-gpu-test
          path: vanitygenerator.exe
